<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#080808">
    <title>Farhan's Eduverse | Premium Academy</title>
    
    <link rel="icon" href="https://fav.farm/🎓" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { background-color: #080808; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #080808; }
        ::-webkit-scrollbar-thumb { background: #e11d48; border-radius: 10px; }
        .sidebar-transition { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .course-card:hover { transform: translateY(-5px); border-color: #e11d48; transition: 0.3s; }
        input, textarea, select { background: #1a1a1a !important; border: 1px solid rgba(255,255,255,0.05) !important; color: white !important; }
    </style>
</head>
<body>

    <div id="login-page" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-[#111] border border-white/10 rounded-[2.5rem] p-10 shadow-2xl text-center">
            <h1 class="text-4xl font-black mb-2 tracking-tighter italic">FARHAN'S <span class="text-rose-600 underline decoration-rose-900/50">EDUVERSE</span></h1>
            <p class="text-gray-500 mb-10 text-sm tracking-widest uppercase font-bold">Student & Mentor Portal</p>
            <div class="space-y-4 text-left">
                <input type="tel" id="login-phone" placeholder="Phone Number" class="w-full rounded-2xl p-4 outline-none focus:ring-2 focus:ring-rose-600">
                <input type="password" id="login-pass" placeholder="Password (Fixed for this number)" class="w-full rounded-2xl p-4 outline-none focus:ring-2 focus:ring-rose-600">
                <button onclick="handleLogin()" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-4 rounded-2xl mt-4 transition-all shadow-lg shadow-rose-900/20">Enter Classroom</button>
                <p class="text-[10px] text-gray-600 text-center mt-4 uppercase tracking-widest">New users will be registered automatically</p>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen">
        <nav class="border-b border-white/5 p-6 flex justify-between items-center bg-[#080808]/90 sticky top-0 z-40 backdrop-blur-md">
            <div class="flex items-center gap-4">
                <h1 class="text-2xl font-black tracking-tighter cursor-pointer" onclick="switchView('free')">FARHAN'S <span class="text-rose-600">EDUVERSE</span></h1>
                <button onclick="toggleNoticeSidebar()" class="relative p-2 bg-white/5 rounded-full hover:bg-rose-600/20 transition-all">
                    <span id="notice-dot" class="absolute top-2 right-2 w-2 h-2 bg-rose-500 rounded-full animate-ping hidden"></span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
                </button>
            </div>
            <div class="flex items-center gap-4">
                <button id="academy-btn" onclick="switchView('paid')" class="bg-rose-600/10 text-rose-500 border border-rose-600/20 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-rose-600 hover:text-white transition-all">Paid Academy 💎</button>
                <span id="admin-tag" class="hidden bg-white/5 text-gray-400 text-[10px] px-3 py-1 rounded-full border border-white/10 font-bold tracking-widest uppercase">Operator</span>
                <button onclick="logout()" class="bg-white/5 hover:bg-rose-600 px-5 py-2 rounded-xl text-xs transition-all font-bold">Logout</button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-6">
            
            <div id="admin-panel" class="hidden mb-12 bg-[#111] border-2 border-dashed border-rose-600/30 rounded-[2.5rem] p-10">
                <h2 class="text-2xl font-black text-rose-500 italic uppercase mb-8">Operator Dashboard</h2>
                <div class="flex gap-4 mb-8">
                    <button onclick="setAdminTab('free')" id="adm-tab-free" class="bg-rose-600 text-white px-6 py-2 rounded-full text-xs font-bold">Free Videos</button>
                    <button onclick="setAdminTab('paid')" id="adm-tab-paid" class="bg-white/5 text-gray-400 px-6 py-2 rounded-full text-xs font-bold">Paid Courses</button>
                    <button onclick="setAdminTab('verify')" id="adm-tab-verify" class="bg-white/5 text-gray-400 px-6 py-2 rounded-full text-xs font-bold">Verify Payments</button>
                </div>

                <div id="adm-sec-free" class="grid grid-cols-1 md:grid-cols-4 gap-4 pb-10">
                    <input id="v-title" placeholder="Lesson Title" class="p-4 rounded-2xl outline-none">
                    <input id="v-url" placeholder="YouTube URL" class="p-4 rounded-2xl outline-none">
                    <select id="v-cat" class="p-4 rounded-2xl outline-none">
                        <option value="SSC">SSC</option><option value="HSC">HSC</option><option value="Admission">Admission</option>
                    </select>
                    <button onclick="addVideo()" class="bg-rose-600 hover:bg-rose-700 text-white font-bold rounded-2xl p-4">Publish Free Video</button>
                </div>

                <div id="adm-sec-paid" class="hidden space-y-4 pb-10">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input id="c-title" placeholder="Course Title" class="p-4 rounded-2xl outline-none">
                        <input id="c-price" type="number" placeholder="Price (BDT)" class="p-4 rounded-2xl outline-none">
                        <input id="c-thumb" placeholder="Thumbnail URL" class="p-4 rounded-2xl outline-none">
                        <input id="c-playlist" placeholder="Secret Playlist Link" class="p-4 rounded-2xl outline-none">
                        <textarea id="c-desc" placeholder="Course Description..." class="md:col-span-2 p-4 rounded-2xl outline-none h-24"></textarea>
                        <button onclick="publishPaidCourse()" class="md:col-span-2 bg-rose-600 text-white font-black rounded-2xl p-4 uppercase">Launch Premium Course</button>
                    </div>
                </div>

                <div id="adm-sec-verify" class="hidden space-y-4">
                    <div id="pending-list" class="space-y-4 max-h-[400px] overflow-y-auto"></div>
                </div>

                <div class="mt-10 pt-10 border-t border-white/5">
                    <h3 class="text-xs font-black text-rose-500 uppercase tracking-widest mb-4">📢 Update Student Notice</h3>
                    <div class="flex flex-col md:flex-row gap-4">
                        <input id="notice-input" placeholder="Type message..." class="flex-1 p-4 rounded-2xl outline-none">
                        <button onclick="publishNewNotice()" class="bg-white text-black font-black px-10 py-4 rounded-2xl hover:bg-rose-600 hover:text-white transition-all">Push Broadcast</button>
                    </div>
                </div>
            </div>

            <div id="free-view">
                <div class="flex gap-4 p-1.5 bg-[#111] rounded-[2rem] border border-white/5 w-fit mb-16 mx-auto md:mx-0">
                    <button onclick="setTab('SSC')" id="tab-SSC" class="tab-btn px-10 py-4 rounded-[1.5rem] font-black text-sm transition-all">SSC</button>
                    <button onclick="setTab('HSC')" id="tab-HSC" class="tab-btn px-10 py-4 rounded-[1.5rem] font-black text-sm transition-all">HSC</button>
                    <button onclick="setTab('Admission')" id="tab-Admission" class="tab-btn px-10 py-4 rounded-[1.5rem] font-black text-sm transition-all">Admission</button>
                </div>
                <div id="video-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12"></div>
            </div>

            <div id="paid-view" class="hidden">
                <div class="mb-12"><h2 class="text-4xl font-black italic">PREMIUM <span class="text-rose-600">ACADEMY</span></h2></div>
                <div id="paid-course-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>
        </div>
    </div>

    <div id="pay-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-xl z-[100] flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-[#111] border border-white/10 rounded-[2.5rem] p-10 relative">
            <button onclick="closePayModal()" class="absolute top-6 right-6 text-gray-500">✕</button>
            <h3 id="pay-course-name" class="text-2xl font-black text-rose-500 mb-8 italic">ENROLL NOW</h3>
            <div class="bg-rose-600/10 border border-rose-500/20 p-6 rounded-3xl mb-8 text-center">
                <p class="text-xs text-rose-400 font-bold uppercase mb-2">bKash Personal</p>
                <p class="text-3xl font-black text-white">01533082057</p>
                <p id="pay-amount" class="text-sm font-bold text-gray-400 mt-2"></p>
            </div>
            <div class="space-y-4">
                <input id="pay-trx" placeholder="Transaction ID (TrxID)" class="w-full rounded-2xl p-4 outline-none">
                <button onclick="submitEnrollment()" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-black py-4 rounded-2xl">Request Access</button>
            </div>
        </div>
    </div>

    <div id="notice-sidebar" class="fixed inset-y-0 right-0 w-85 max-w-[85%] bg-[#0a0a0a] border-l border-white/5 sidebar-transition translate-x-full z-50 p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-10"><h3 class="text-2xl font-black italic">NOTICES</h3><button onclick="toggleNoticeSidebar()">✕</button></div>
        <div id="sidebar-content" class="space-y-6"></div>
    </div>
    <div id="sidebar-overlay" onclick="toggleNoticeSidebar()" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-40"></div>

    <script>
        const SB_URL = "https://zfvldodcinjjpjcfgqdt.supabase.co"; 
        const SB_KEY = "sb_publishable_JtkUYO8tBkzdIxz9xStn5A_B9YQgHwE";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let isAdmin = false;
        let currentUserPhone = "";
        let selectedCourseId = null;
        let videos = [];
        let currentTab = 'SSC';

        window.onload = async () => {
            const session = localStorage.getItem('eduverse_session');
            if(session) {
                const data = JSON.parse(session);
                currentUserPhone = data.phone;
                isAdmin = data.isAdmin;
                showApp();
            }
            setTab('SSC');
            fetchVideos();
        };

        async function handleLogin() {
            const phone = document.getElementById('login-phone').value;
            const pass = document.getElementById('login-pass').value;
            if(!phone || !pass) return alert("Fill all fields");

            const { data: user } = await supabaseClient.from('users').select('*').eq('phone', phone).single();

            if(!user) {
                const { error } = await supabaseClient.from('users').insert([{ phone, password: pass }]);
                if(!error) completeLogin(phone, false);
            } else if(user.password === pass) {
                completeLogin(phone, user.is_admin);
            } else {
                alert("Incorrect Password!");
            }
        }

        function completeLogin(phone, adminStatus) {
            currentUserPhone = phone;
            isAdmin = adminStatus;
            localStorage.setItem('eduverse_session', JSON.stringify({ phone, isAdmin }));
            showApp();
        }

        function showApp() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            if(isAdmin) {
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('admin-tag').classList.remove('hidden');
                fetchEnrollments();
            }
            fetchNotices();
            loadPaidCourses();
        }

        // --- ADMIN FUNCTIONS ---
        async function addVideo() {
            const title = document.getElementById('v-title').value;
            const rawUrl = document.getElementById('v-url').value;
            const cat = document.getElementById('v-cat').value;
            let vidId = rawUrl.includes("v=") ? rawUrl.split("v=")[1].split("&")[0] : rawUrl.split("/").pop();
            const thumb = `https://i.ytimg.com/vi/${vidId}/maxresdefault.jpg`;

            const { error } = await supabaseClient.from('videos').insert([{ title, url: vidId, category: cat, thumbnail_url: thumb }]);
            if(!error) { alert("Published!"); fetchVideos(); }
        }

        async function publishPaidCourse() {
            const title = document.getElementById('c-title').value;
            const price = document.getElementById('c-price').value;
            const desc = document.getElementById('c-desc').value;
            const link = document.getElementById('c-playlist').value;
            const thumb = document.getElementById('c-thumb').value;

            const { error } = await supabaseClient.from('paid_courses').insert([{ title, price: parseInt(price), description: desc, video_playlist_link: link, thumbnail_url: thumb }]);
            if(!error) { alert("Course Launched!"); loadPaidCourses(); }
        }

        async function fetchEnrollments() {
            const { data } = await supabaseClient.from('course_access').select('*, paid_courses(title)').eq('status', 'pending');
            const container = document.getElementById('pending-list');
            container.innerHTML = data?.length ? data.map(e => `
                <div class="bg-black/50 border border-white/5 p-4 rounded-2xl flex justify-between items-center">
                    <div><p class="font-bold">${e.paid_courses?.title}</p><p class="text-[10px] text-gray-500">${e.student_phone} | ${e.trx_id}</p></div>
                    <div class="flex gap-2">
                        <button onclick="verifyPayment('${e.id}', 'approved')" class="bg-green-600 px-4 py-2 rounded-lg text-[10px] font-bold">Approve</button>
                        <button onclick="verifyPayment('${e.id}', 'rejected')" class="bg-white/10 px-4 py-2 rounded-lg text-[10px] font-bold">Reject</button>
                    </div>
                </div>
            `).join('') : '<p class="text-gray-500 text-center py-4">No pending requests</p>';
        }

        async function verifyPayment(id, status) {
            await supabaseClient.from('course_access').update({ status }).eq('id', id);
            fetchEnrollments();
            loadPaidCourses();
        }

        // --- USER FUNCTIONS ---
        async function loadPaidCourses() {
            const { data: courses } = await supabaseClient.from('paid_courses').select('*');
            const { data: access } = await supabaseClient.from('course_access').select('course_id').eq('student_phone', currentUserPhone).eq('status', 'approved');
            const paidIds = access ? access.map(a => a.course_id) : [];

            document.getElementById('paid-course-grid').innerHTML = courses?.map(c => `
                <div class="course-card bg-[#111] border border-white/5 rounded-[2.5rem] overflow-hidden flex flex-col h-full">
                    <img src="${c.thumbnail_url}" class="h-48 w-full object-cover">
                    <div class="p-8 flex flex-col flex-1">
                        <h3 class="text-xl font-black mb-2">${c.title}</h3>
                        <p class="text-gray-500 text-sm mb-6 italic line-clamp-2">${c.description}</p>
                        <div class="mt-auto pt-6 border-t border-white/5 flex justify-between items-center">
                            <div><p class="text-2xl font-black text-rose-500">৳${c.price}</p></div>
                            ${paidIds.includes(c.id) ? 
                                `<a href="${c.video_playlist_link}" target="_blank" class="bg-green-600 px-6 py-3 rounded-2xl text-xs font-bold">Enter Class</a>` :
                                `<button onclick="openPayModal(${c.id}, '${c.title}', ${c.price})" class="bg-rose-600 px-6 py-3 rounded-2xl text-xs font-bold">Buy Now</button>`
                            }
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function submitEnrollment() {
            const trx = document.getElementById('pay-trx').value;
            if(!trx) return alert("Enter TrxID");
            const { error } = await supabaseClient.from('course_access').insert([{ student_phone: currentUserPhone, trx_id: trx, course_id: selectedCourseId, status: 'pending' }]);
            if(!error) { alert("Submitted!"); closePayModal(); }
        }

        async function fetchNotices() {
            const { data } = await supabaseClient.from('notices').select('*').order('created_at', { ascending: false });
            document.getElementById('sidebar-content').innerHTML = data?.map(n => `
                <div class="bg-[#111] p-6 rounded-[2rem] border border-white/5">
                    <p class="text-gray-200 text-sm italic">${n.content}</p>
                </div>
            `).join('');
            if(data?.length) document.getElementById('notice-dot').classList.remove('hidden');
        }

        async function fetchVideos() {
            const { data } = await supabaseClient.from('videos').select('*').order('created_at', { ascending: false });
            videos = data || [];
            renderVideos();
        }

        function renderVideos() {
            const filtered = videos.filter(v => v.category === currentTab);
            document.getElementById('video-grid').innerHTML = filtered.map(v => `
                <div class="group">
                    <div class="aspect-video bg-black rounded-[2rem] overflow-hidden border border-white/5 relative">
                        <iframe class="w-full h-full" src="https://www.youtube.com/embed/${v.url}" frameborder="0" allowfullscreen></iframe>
                        ${isAdmin ? `<button onclick="deleteVideo('${v.id}')" class="absolute top-2 right-2 bg-black/60 p-2 rounded-full text-rose-500">✕</button>` : ''}
                    </div>
                    <h3 class="mt-4 font-black">${v.title}</h3>
                </div>
            `).join('');
        }

        function switchView(v) {
            document.getElementById('free-view').classList.toggle('hidden', v !== 'free');
            document.getElementById('paid-view').classList.toggle('hidden', v !== 'paid');
            document.getElementById('academy-btn').innerText = v === 'paid' ? "Back Home ←" : "Paid Academy 💎";
            document.getElementById('academy-btn').onclick = () => switchView(v === 'paid' ? 'free' : 'paid');
        }

        function setTab(t) { currentTab = t; renderVideos(); }
        function openPayModal(id, title, price) { selectedCourseId = id; document.getElementById('pay-course-name').innerText = title; document.getElementById('pay-amount').innerText = `৳${price}`; document.getElementById('pay-modal').classList.remove('hidden'); }
        function closePayModal() { document.getElementById('pay-modal').classList.add('hidden'); }
        function toggleNoticeSidebar() { document.getElementById('notice-sidebar').classList.toggle('translate-x-full'); document.getElementById('sidebar-overlay').classList.toggle('hidden'); }
        function setAdminTab(tab) { ['free', 'paid', 'verify'].forEach(s => document.getElementById(`adm-sec-${s}`).classList.toggle('hidden', s !== tab)); }
        function logout() { localStorage.removeItem('eduverse_session'); location.reload(); }
        async function deleteVideo(id) { if(confirm("Delete?")) { await supabaseClient.from('videos').delete().eq('id', id); fetchVideos(); } }
        async function publishNewNotice() { const val = document.getElementById('notice-input').value; if(val) { await supabaseClient.from('notices').insert([{ content: val }]); document.getElementById('notice-input').value = ""; fetchNotices(); } }
    </script>
</body>
</html>
