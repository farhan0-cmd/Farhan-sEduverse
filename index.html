<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#080808">
    <title>Farhan's Eduverse | Premium Academy</title>
    
    <link rel="icon" href="https://fav.farm/🎓" />
    <link rel="apple-touch-icon" href="https://fav.farm/🎓">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { background-color: #080808; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #080808; }
        ::-webkit-scrollbar-thumb { background: #e11d48; border-radius: 10px; }
        .sidebar-transition { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .course-card:hover { transform: translateY(-5px); border-color: #e11d48; }
        textarea { resize: none; }
    </style>
</head>
<body>

    <div id="login-page" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-[#111] border border-white/10 rounded-[2.5rem] p-10 shadow-2xl text-center">
            <h1 class="text-4xl font-black mb-2 tracking-tighter italic">FARHAN'S <span class="text-rose-600 underline decoration-rose-900/50">EDUVERSE</span></h1>
            <p class="text-gray-500 mb-10 text-sm tracking-widest uppercase font-bold">Mentor Portal</p>
            <div class="space-y-4 text-left">
                <input type="tel" id="login-phone" placeholder="Phone Number" class="w-full bg-[#1a1a1a] border border-white/5 rounded-2xl p-4 text-white outline-none focus:ring-2 focus:ring-rose-600">
                <input type="password" id="login-pass" placeholder="Password" class="w-full bg-[#1a1a1a] border border-white/5 rounded-2xl p-4 text-white outline-none focus:ring-2 focus:ring-rose-600">
                <button onclick="handleLogin(false)" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-4 rounded-2xl mt-4 transition-all shadow-lg shadow-rose-900/20">Enter Classroom</button>
                <button onclick="handleLogin(true)" class="w-full text-[10px] text-gray-600 mt-6 hover:text-rose-500 transition uppercase tracking-widest font-bold text-center">Operator Access (Admin Only)</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen">
        <nav class="border-b border-white/5 p-6 flex justify-between items-center bg-[#080808]/90 sticky top-0 z-40 backdrop-blur-md">
            <div class="flex items-center gap-4">
                <h1 class="text-2xl font-black tracking-tighter cursor-pointer" onclick="switchView('free')">FARHAN'S <span class="text-rose-600">EDUVERSE</span></h1>
                <button onclick="toggleNoticeSidebar()" class="relative p-2 bg-white/5 rounded-full hover:bg-rose-600/20 transition-all group">
                    <span id="notice-dot" class="absolute top-2 right-2 w-2 h-2 bg-rose-500 rounded-full animate-ping hidden"></span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-gray-400 group-hover:text-rose-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                </button>
            </div>
            <div class="flex items-center gap-4">
                <button id="academy-btn" onclick="switchView('paid')" class="bg-rose-600/10 text-rose-500 border border-rose-600/20 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-rose-600 hover:text-white transition-all">Paid Academy 💎</button>
                <span id="admin-tag" class="hidden bg-white/5 text-gray-400 text-[10px] px-3 py-1 rounded-full border border-white/10 font-bold tracking-widest uppercase">Operator</span>
                <button onclick="logout()" class="bg-white/5 hover:bg-rose-600 px-5 py-2 rounded-xl text-xs transition-all font-bold">Logout</button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-6">
            
            <div id="admin-panel" class="hidden mb-12 bg-[#111] border-2 border-dashed border-rose-600/30 rounded-[2.5rem] p-10">
                <h2 class="text-2xl font-black text-rose-500 italic uppercase mb-8">Operator Dashboard</h2>
                
                <div class="flex gap-4 mb-8">
                    <button onclick="setAdminTab('free')" id="adm-tab-free" class="bg-rose-600 text-white px-6 py-2 rounded-full text-xs font-bold">Free Videos</button>
                    <button onclick="setAdminTab('paid')" id="adm-tab-paid" class="bg-white/5 text-gray-400 px-6 py-2 rounded-full text-xs font-bold">Paid Courses</button>
                    <button onclick="setAdminTab('verify')" id="adm-tab-verify" class="bg-white/5 text-gray-400 px-6 py-2 rounded-full text-xs font-bold">Verify Payments</button>
                </div>

                <div id="adm-sec-free" class="grid grid-cols-1 md:grid-cols-4 gap-4 pb-10 border-b border-white/5">
                    <input id="v-title" placeholder="Lesson Title" class="bg-[#1a1a1a] border border-white/10 p-4 rounded-2xl text-white outline-none">
                    <input id="v-url" placeholder="YouTube URL" class="bg-[#1a1a1a] border border-white/10 p-4 rounded-2xl text-white outline-none">
                    <select id="v-cat" class="bg-[#1a1a1a] border border-white/10 p-4 rounded-2xl text-white outline-none">
                        <option value="SSC">SSC</option>
                        <option value="HSC">HSC</option>
                        <option value="Admission">Admission</option>
                    </select>
                    <button onclick="addVideo()" class="bg-rose-600 hover:bg-rose-700 text-white font-bold rounded-2xl p-4">Publish Free Video</button>
                </div>

                <div id="adm-sec-paid" class="hidden space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input id="c-title" placeholder="Course Title" class="bg-[#1a1a1a] border border-white/10 p-4 rounded-2xl text-white outline-none">
                        <input id="c-price" type="number" placeholder="Price (BDT)" class="bg-[#1a1a1a] border border-white/10 p-4 rounded-2xl text-white outline-none">
                        <input id="c-thumb" placeholder="Thumbnail Image URL" class="bg-[#1a1a1a] border border-white/10 p-4 rounded-2xl text-white outline-none">
                        <input id="c-playlist" placeholder="Secret Playlist Link" class="bg-[#1a1a1a] border border-white/10 p-4 rounded-2xl text-white outline-none">
                        <textarea id="c-desc" placeholder="Course Description (e.g. 1500+ MCQ Solve, Tips & Tricks...)" class="md:col-span-2 bg-[#1a1a1a] border border-white/10 p-4 rounded-2xl text-white outline-none h-32"></textarea>
                        <button onclick="publishPaidCourse()" class="md:col-span-2 bg-rose-600 text-white font-black rounded-2xl p-4 uppercase tracking-widest">Launch Premium Course</button>
                    </div>
                </div>

                <div id="adm-sec-verify" class="hidden">
                    <div id="pending-list" class="space-y-4 max-h-[400px] overflow-y-auto">
                        <p class="text-gray-500 text-center py-10">No pending verification requests.</p>
                    </div>
                </div>

                <div class="mt-10">
                    <h3 class="text-xs font-black text-rose-500 uppercase tracking-widest mb-4">📢 Update Student Notice</h3>
                    <div class="flex flex-col md:flex-row gap-4 items-center">
                        <input id="notice-input" placeholder="Type your message here..." class="flex-1 w-full bg-[#1a1a1a] border border-white/10 p-4 rounded-2xl text-white outline-none">
                        <button id="broadcast-btn" onclick="publishNewNotice()" class="w-full md:w-auto bg-white text-black font-black px-10 py-4 rounded-2xl hover:bg-rose-600 hover:text-white transition-all">Push Broadcast</button>
                    </div>
                </div>
            </div>

            <div id="free-view">
                <div class="flex gap-4 p-1.5 bg-[#111] rounded-[2rem] border border-white/5 w-fit mb-16 mx-auto md:mx-0">
                    <button onclick="setTab('SSC')" id="tab-SSC" class="tab-btn px-10 py-4 rounded-[1.5rem] font-black text-sm transition-all">SSC</button>
                    <button onclick="setTab('HSC')" id="tab-HSC" class="tab-btn px-10 py-4 rounded-[1.5rem] font-black text-sm transition-all">HSC</button>
                    <button onclick="setTab('Admission')" id="tab-Admission" class="tab-btn px-10 py-4 rounded-[1.5rem] font-black text-sm transition-all">Admission</button>
                </div>
                <div id="video-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12"></div>
            </div>

            <div id="paid-view" class="hidden">
                <div class="mb-12">
                    <h2 class="text-4xl font-black italic">PREMIUM <span class="text-rose-600">ACADEMY</span></h2>
                    <p class="text-gray-500 mt-2">Structured paid courses for intensive preparation.</p>
                </div>
                <div id="paid-course-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>
        </div>
    </div>

    <div id="pay-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-xl z-[100] flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-[#111] border border-white/10 rounded-[2.5rem] p-10 relative">
            <button onclick="closePayModal()" class="absolute top-6 right-6 text-gray-500">✕</button>
            <h3 class="text-2xl font-black text-rose-500 mb-2 italic">ENROLL NOW</h3>
            <p id="pay-course-name" class="text-gray-400 text-sm mb-8 uppercase font-bold tracking-widest"></p>
            
            <div class="bg-rose-600/10 border border-rose-500/20 p-6 rounded-3xl mb-8 text-center">
                <p class="text-xs text-rose-400 font-bold uppercase mb-2">Send Money to (bKash Personal)</p>
                <p class="text-3xl font-black text-white">01533082057</p>
                <p id="pay-amount" class="text-sm font-bold text-gray-400 mt-2"></p>
            </div>

            <div class="space-y-4">
                <input id="pay-phone" placeholder="Your bKash Number" class="w-full bg-[#1a1a1a] border border-white/5 rounded-2xl p-4 text-white outline-none">
                <input id="pay-trx" placeholder="Transaction ID (TrxID)" class="w-full bg-[#1a1a1a] border border-white/5 rounded-2xl p-4 text-white outline-none">
                <button onclick="submitEnrollment()" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-black py-4 rounded-2xl shadow-lg shadow-rose-900/20">Verify & Request Access</button>
            </div>
        </div>
    </div>

    <div id="notice-sidebar" class="fixed inset-y-0 right-0 w-85 max-w-[85%] bg-[#0a0a0a] border-l border-white/5 shadow-2xl sidebar-transition translate-x-full z-50 p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <h3 class="text-2xl font-black text-white italic">NOTICES</h3>
            <button onclick="toggleNoticeSidebar()" class="w-10 h-10 flex bg-white/5 rounded-full items-center justify-center">✕</button>
        </div>
        <div id="sidebar-content" class="space-y-6"></div>
    </div>
    <div id="sidebar-overlay" onclick="toggleNoticeSidebar()" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-40"></div>

    <script>
        const SB_URL = "https://zfvldodcinjjpjcfgqdt.supabase.co"; 
        const SB_KEY = "sb_publishable_JtkUYO8tBkzdIxz9xStn5A_B9YQgHwE";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const MASTER_PHONE = "01533082057";
        const MASTER_PASS = "FARHAN03";

        let isAdmin = false;
        let currentUserPhone = "";
        let selectedCourseId = null;
        let videos = [];
        let currentTab = 'SSC';

        window.onload = async function() {
            const savedUser = localStorage.getItem('eduverse_session');
            if (savedUser) {
                const userData = JSON.parse(savedUser);
                isAdmin = userData.isAdmin;
                currentUserPhone = userData.phone;
                showApp();
            }
            setTab('SSC'); 
            fetchVideos();
        };

        function switchView(view) {
            const free = document.getElementById('free-view');
            const paid = document.getElementById('paid-view');
            const btn = document.getElementById('academy-btn');

            if(view === 'paid') {
                free.classList.add('hidden');
                paid.classList.remove('hidden');
                btn.innerText = "Back to Free Lectures ←";
                btn.setAttribute('onclick', "switchView('free')");
                loadPaidCourses();
            } else {
                paid.classList.add('hidden');
                free.classList.remove('hidden');
                btn.innerText = "Paid Academy 💎";
                btn.setAttribute('onclick', "switchView('paid')");
            }
        }

        async function handleLogin(isOp) {
            const phone = document.getElementById('login-phone').value;
            const pass = document.getElementById('login-pass').value;
            if(isOp && phone === MASTER_PHONE && pass === MASTER_PASS) isAdmin = true;
            else if(!isOp && phone) isAdmin = false;
            else return alert("Invalid Login");

            currentUserPhone = phone;
            localStorage.setItem('eduverse_session', JSON.stringify({ phone, isAdmin }));
            showApp();
        }

        function showApp() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            fetchNotices();
            if(isAdmin) {
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('admin-tag').classList.remove('hidden');
                fetchEnrollments();
            }
        }

        function setAdminTab(tab) {
            const sections = ['free', 'paid', 'verify'];
            sections.forEach(s => {
                document.getElementById(`adm-sec-${s}`).classList.toggle('hidden', s !== tab);
                const btn = document.getElementById(`adm-tab-${s}`);
                btn.classList.toggle('bg-rose-600', s === tab);
                btn.classList.toggle('text-white', s === tab);
                btn.classList.toggle('bg-white/5', s !== tab);
                btn.classList.toggle('text-gray-400', s !== tab);
            });
        }

        async function publishPaidCourse() {
            const title = document.getElementById('c-title').value;
            const price = document.getElementById('c-price').value;
            const desc = document.getElementById('c-desc').value;
            const thumb = document.getElementById('c-thumb').value || "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1000&auto=format&fit=crop";
            const link = document.getElementById('c-playlist').value;

            if(!title || !price || !link || !desc) return alert("Please fill all fields, including description!");

            const { error } = await supabaseClient.from('paid_courses').insert([{ 
                title, 
                price, 
                description: desc,
                thumbnail_url: thumb, 
                video_playlist_link: link 
            }]);
            
            if(!error) {
                alert("Premium Course Launched!");
                loadPaidCourses();
                ['c-title', 'c-price', 'c-thumb', 'c-playlist', 'c-desc'].forEach(id => document.getElementById(id).value = "");
            } else {
                alert("Error launching course. Check database column.");
            }
        }

        async function fetchEnrollments() {
            const { data, error } = await supabaseClient.from('course_access').select('*, paid_courses(title)').eq('status', 'pending');
            const container = document.getElementById('pending-list');
            if(data && data.length > 0) {
                container.innerHTML = data.map(e => `
                    <div class="bg-black/50 border border-white/5 p-4 rounded-2xl flex justify-between items-center">
                        <div>
                            <p class="text-white font-bold">${e.paid_courses ? e.paid_courses.title : 'Deleted Course'}</p>
                            <p class="text-[10px] text-gray-500">Phone: ${e.student_phone} | TrxID: ${e.trx_id}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="verifyPayment('${e.id}', 'approved')" class="bg-green-600 text-white px-4 py-2 rounded-lg text-[10px] font-bold">Approve</button>
                            <button onclick="verifyPayment('${e.id}', 'rejected')" class="bg-white/10 text-gray-500 px-4 py-2 rounded-lg text-[10px] font-bold">Reject</button>
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = `<p class="text-gray-500 text-center py-10">No pending verification requests.</p>`;
            }
        }

        async function verifyPayment(id, status) {
            const { error } = await supabaseClient.from('course_access').update({ status }).eq('id', id);
            if(!error) {
                alert("Status Updated!");
                fetchEnrollments();
                if(!document.getElementById('paid-view').classList.contains('hidden')) loadPaidCourses();
            }
        }

        async function loadPaidCourses() {
            const container = document.getElementById('paid-course-grid');
            container.innerHTML = `<p class="text-gray-500">Scanning Academy...</p>`;

            const { data: courses } = await supabaseClient.from('paid_courses').select('*');
            const { data: access } = await supabaseClient.from('course_access').select('course_id').eq('student_phone', currentUserPhone).eq('status', 'approved');

            const accessList = access ? access.map(a => a.course_id) : [];

            if (!courses || courses.length === 0) {
                container.innerHTML = `<p class="text-gray-500 text-center py-10">No premium courses available yet.</p>`;
                return;
            }

            container.innerHTML = courses.map(c => {
                const isPaid = accessList.includes(c.id);
                return `
                    <div class="course-card bg-[#111] border border-white/5 rounded-[2.5rem] overflow-hidden transition-all flex flex-col h-full">
                        <div class="h-48 bg-gray-800 relative">
                            <img src="${c.thumbnail_url}" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1000&auto=format&fit=crop'">
                            <div class="absolute top-4 right-4 bg-rose-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase">Premium</div>
                        </div>
                        <div class="p-8 flex flex-col flex-1">
                            <h3 class="text-xl font-black mb-2 leading-tight">${c.title}</h3>
                            <p class="text-gray-500 text-sm mb-6 line-clamp-3 italic">${c.description || 'No description provided.'}</p>
                            <div class="mt-auto pt-6 border-t border-white/5 flex justify-between items-center">
                                <div>
                                    <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Price</p>
                                    <p class="text-2xl font-black text-rose-500">৳${c.price}</p>
                                </div>
                                ${isPaid ? 
                                    `<a href="${c.video_playlist_link}" target="_blank" class="bg-green-600 hover:bg-green-700 text-white font-black px-6 py-3 rounded-2xl text-xs">Enter Classroom</a>` :
                                    `<button onclick="openPayModal(${c.id}, '${c.title}', ${c.price})" class="bg-rose-600 hover:bg-rose-700 text-white font-black px-6 py-3 rounded-2xl text-xs">Buy Now</button>`
                                }
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openPayModal(id, title, price) {
            selectedCourseId = id;
            document.getElementById('pay-course-name').innerText = title;
            document.getElementById('pay-amount').innerText = "Amount: ৳" + price;
            document.getElementById('pay-modal').classList.remove('hidden');
        }

        function closePayModal() { document.getElementById('pay-modal').classList.add('hidden'); }

        async function submitEnrollment() {
            const phone = document.getElementById('pay-phone').value;
            const trx = document.getElementById('pay-trx').value;

            if(!phone || !trx) return alert("Please fill both fields!");

            const { error } = await supabaseClient.from('course_access').insert([{
                student_phone: phone,
                trx_id: trx,
                course_id: selectedCourseId,
                status: 'pending'
            }]);

            if(error) {
                alert("Error: Transaction ID might be already used.");
            } else {
                alert("Payment Submitted! Admin will verify your bKash TrxID within 30 mins.");
                closePayModal();
                loadPaidCourses();
            }
        }

        async function fetchNotices() {
            const container = document.getElementById('sidebar-content');
            const { data } = await supabaseClient.from('notices').select('*').order('created_at', { ascending: false });
            if (!data) return;
            container.innerHTML = data.map(n => `
                <div class="bg-[#111] border border-white/5 p-6 rounded-[2rem]">
                    <p class="text-[10px] text-rose-500 font-black mb-2 uppercase">Announcement</p>
                    <p class="text-gray-200 text-sm italic">${n.content}</p>
                    <div class="mt-6 pt-4 border-t border-white/5 flex justify-between items-center">
                        <span class="text-[9px] text-gray-600 font-bold uppercase">${new Date(n.created_at).toLocaleDateString()}</span>
                        ${isAdmin ? `<button onclick="deleteNotice('${n.id}')" class="text-rose-500">Delete</button>` : ''}
                    </div>
                </div>
            `).join('');
            if(data.length > 0) document.getElementById('notice-dot').classList.remove('hidden');
        }

        async function publishNewNotice() {
            const val = document.getElementById('notice-input').value;
            if(!val) return;
            const { error } = await supabaseClient.from('notices').insert([{ content: val }]);
            if(!error) { document.getElementById('notice-input').value = ""; fetchNotices(); alert("Published!"); }
        }

        async function deleteNotice(id) {
            if(!confirm("Delete?")) return;
            await supabaseClient.from('notices').delete().eq('id', id);
            fetchNotices();
        }

        function toggleNoticeSidebar() {
            document.getElementById('notice-sidebar').classList.toggle('translate-x-full');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        }

        async function fetchVideos() {
            const { data } = await supabaseClient.from('videos').select('*').order('created_at', { ascending: false });
            if (data) { 
                videos = data; 
                renderVideos(); 
            }
        }

        async function addVideo() {
            const title = document.getElementById('v-title').value;
            const url = document.getElementById('v-url').value;
            const cat = document.getElementById('v-cat').value;
            
            if(!title || !url) return alert("Fill all fields");

            const vidId = url.includes("v=") ? url.split("v=")[1].split("&")[0] : url.split("/").pop();
            const { error } = await supabaseClient.from('videos').insert([{ title, url: vidId, category: cat }]);
            if(!error) { 
                document.getElementById('v-title').value = ""; 
                document.getElementById('v-url').value = ""; 
                fetchVideos(); 
            }
        }

        function setTab(t) {
            currentTab = t;
            ['SSC', 'HSC', 'Admission'].forEach(tab => {
                const btn = document.getElementById(`tab-${tab}`);
                if(tab === t) {
                    btn.classList.add('bg-rose-600', 'text-white', 'shadow-lg', 'shadow-rose-900/40');
                    btn.classList.remove('text-gray-400');
                } else {
                    btn.classList.remove('bg-rose-600', 'text-white', 'shadow-lg', 'shadow-rose-900/40');
                    btn.classList.add('text-gray-400');
                }
            });
            renderVideos();
        }

        function renderVideos() {
            const grid = document.getElementById('video-grid');
            if(!videos || videos.length === 0) {
                grid.innerHTML = `<p class="text-gray-500 col-span-full text-center py-20">No videos found in this sector.</p>`;
                return;
            }
            const filtered = videos.filter(v => v.category === currentTab);
            if(filtered.length === 0) {
                grid.innerHTML = `<p class="text-gray-500 col-span-full text-center py-20">No videos found for ${currentTab}.</p>`;
                return;
            }

            grid.innerHTML = filtered.map(v => `
                <div class="group">
                    <div class="aspect-video bg-black rounded-[2rem] overflow-hidden border border-white/5">
                        <iframe class="w-full h-full" src="https://www.youtube.com/embed/${v.url}" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <h3 class="mt-4 font-black">${v.title}</h3>
                </div>
            `).join('');
        }

        function logout() { localStorage.removeItem('eduverse_session'); location.reload(); }
    </script>
</body>
</html>
