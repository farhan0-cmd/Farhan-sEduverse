<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#080808">
    <title>Farhan's Eduverse</title>
    
    <link rel="icon" href="https://fav.farm/🎓" />
    <link rel="apple-touch-icon" href="https://fav.farm/🎓">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { background-color: #080808; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #080808; }
        ::-webkit-scrollbar-thumb { background: #e11d48; border-radius: 10px; }
        .sidebar-transition { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>

    <div id="login-page" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-[#111] border border-white/10 rounded-[2.5rem] p-10 shadow-2xl text-center">
            <h1 class="text-4xl font-black mb-2 tracking-tighter italic">FARHAN'S <span class="text-rose-600 underline decoration-rose-900/50">EDUVERSE</span></h1>
            <p class="text-gray-500 mb-10 text-sm tracking-widest uppercase font-bold">Mentor Portal</p>
            <div class="space-y-4 text-left">
                <input type="tel" id="login-phone" placeholder="Phone Number" class="w-full bg-[#1a1a1a] border border-white/5 rounded-2xl p-4 text-white outline-none focus:ring-2 focus:ring-rose-600">
                <input type="password" id="login-pass" placeholder="Password" class="w-full bg-[#1a1a1a] border border-white/5 rounded-2xl p-4 text-white outline-none focus:ring-2 focus:ring-rose-600">
                <button onclick="handleLogin(false)" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-4 rounded-2xl mt-4 transition-all shadow-lg shadow-rose-900/20">Enter Classroom</button>
                <button onclick="handleLogin(true)" class="w-full text-[10px] text-gray-600 mt-6 hover:text-rose-500 transition uppercase tracking-widest font-bold text-center">Operator Access (Admin Only)</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen">
        <nav class="border-b border-white/5 p-6 flex justify-between items-center bg-[#080808]/90 sticky top-0 z-40 backdrop-blur-md">
            <div class="flex items-center gap-4">
                <h1 class="text-2xl font-black tracking-tighter">FARHAN'S <span class="text-rose-600">EDUVERSE</span></h1>
                <button onclick="toggleNoticeSidebar()" class="relative p-2 bg-white/5 rounded-full hover:bg-rose-600/20 transition-all group">
                    <span id="notice-dot" class="absolute top-2 right-2 w-2 h-2 bg-rose-500 rounded-full animate-ping hidden"></span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-gray-400 group-hover:text-rose-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                </button>
            </div>
            <div class="flex items-center gap-4">
                <span id="admin-tag" class="hidden bg-rose-600/10 text-rose-500 text-[10px] px-3 py-1 rounded-full border border-rose-500/20 font-bold tracking-widest uppercase">Operator</span>
                <button onclick="logout()" class="bg-white/5 hover:bg-rose-600 px-5 py-2 rounded-xl text-xs transition-all font-bold">Logout</button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-6">
            <div id="admin-panel" class="hidden mb-12 bg-[#111] border-2 border-dashed border-rose-600/30 rounded-[2.5rem] p-10">
                <h2 class="text-2xl font-black text-rose-500 italic uppercase mb-8">Operator Dashboard</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-10 pb-10 border-b border-white/5">
                    <input id="v-title" placeholder="Lesson Title" class="bg-[#1a1a1a] border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-rose-600">
                    <input id="v-url" placeholder="YouTube URL" class="bg-[#1a1a1a] border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-rose-600">
                    <select id="v-cat" class="bg-[#1a1a1a] border border-white/10 p-4 rounded-2xl text-white outline-none">
                        <option value="SSC">SSC</option>
                        <option value="HSC">HSC</option>
                        <option value="Admission">Admission</option>
                    </select>
                    <button onclick="addVideo()" class="bg-rose-600 hover:bg-rose-700 text-white font-bold rounded-2xl p-4">Publish Video</button>
                </div>

                <div>
                    <h3 class="text-xs font-black text-rose-500 uppercase tracking-widest mb-4">📢 Update Student Notice</h3>
                    <div class="flex flex-col md:flex-row gap-4 items-center">
                        <input id="notice-input" placeholder="Type your message here..." class="flex-1 w-full bg-[#1a1a1a] border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-rose-600">
                        <button id="broadcast-btn" onclick="publishNewNotice()" class="w-full md:w-auto bg-white text-black font-black px-10 py-4 rounded-2xl hover:bg-rose-600 hover:text-white transition-all shadow-xl">Push Broadcast</button>
                    </div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-center gap-8 mb-16">
                <div class="flex gap-4 p-1.5 bg-[#111] rounded-[2rem] border border-white/5">
                    <button onclick="setTab('SSC')" id="tab-SSC" class="tab-btn px-10 py-4 rounded-[1.5rem] font-black text-sm transition-all">SSC</button>
                    <button onclick="setTab('HSC')" id="tab-HSC" class="tab-btn px-10 py-4 rounded-[1.5rem] font-black text-sm transition-all">HSC</button>
                    <button onclick="setTab('Admission')" id="tab-Admission" class="tab-btn px-10 py-4 rounded-[1.5rem] font-black text-sm transition-all">Admission</button>
                </div>
            </div>

            <div id="video-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12"></div>
        </div>
    </div>

    <div id="notice-sidebar" class="fixed inset-y-0 right-0 w-85 max-w-[85%] bg-[#0a0a0a] border-l border-white/5 shadow-2xl sidebar-transition translate-x-full z-50 p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <h3 class="text-2xl font-black text-white italic">NOTICES</h3>
            <button onclick="toggleNoticeSidebar()" class="w-10 h-10 flex bg-white/5 rounded-full items-center justify-center">✕</button>
        </div>
        <div id="sidebar-content" class="space-y-6"></div>
    </div>
    <div id="sidebar-overlay" onclick="toggleNoticeSidebar()" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-40"></div>

    <script>
        const SB_URL = "https://zfvldodcinjjpjcfgqdt.supabase.co"; 
        const SB_KEY = "sb_publishable_JtkUYO8tBkzdIxz9xStn5A_B9YQgHwE";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const MASTER_PHONE = "01533082057";
        const MASTER_PASS = "FARHAN03";

        let isAdmin = false;
        let currentTab = 'SSC';
        let videos = [];

        window.onload = async function() {
            const savedUser = localStorage.getItem('eduverse_session');
            if (savedUser) {
                const userData = JSON.parse(savedUser);
                isAdmin = userData.isAdmin;
                showApp();
            }
            setTab('SSC'); 
            await fetchVideos();
        };

        async function handleLogin(isOp) {
            const phone = document.getElementById('login-phone').value;
            const pass = document.getElementById('login-pass').value;
            if(isOp && phone === MASTER_PHONE && pass === MASTER_PASS) isAdmin = true;
            else if(!isOp && phone) isAdmin = false;
            else return alert("Invalid Login");

            localStorage.setItem('eduverse_session', JSON.stringify({ phone, isAdmin }));
            showApp();
        }

        function showApp() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            fetchNotices();
            if(isAdmin) {
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('admin-tag').classList.remove('hidden');
            }
        }

        async function fetchNotices() {
            const container = document.getElementById('sidebar-content');
            const { data, error } = await supabaseClient.from('notices').select('*').order('created_at', { ascending: false });
            if (error) return;

            container.innerHTML = '';
            data.forEach(n => {
                container.innerHTML += `
                    <div class="bg-[#111] border border-white/5 p-6 rounded-[2rem] relative">
                        <p class="text-[10px] text-rose-500 font-black mb-2 uppercase">Announcement</p>
                        <p class="text-gray-200 text-sm italic">${n.content}</p>
                        <div class="mt-6 pt-4 border-t border-white/5 flex justify-between items-center">
                            <span class="text-[9px] text-gray-600 font-bold uppercase">${new Date(n.created_at).toLocaleDateString()}</span>
                            ${isAdmin ? `
                                <div class="flex gap-4">
                                    <button onclick="editNoticeUI('${n.id}', \`${n.content.replace(/'/g, "\\'")}\`)" class="text-blue-500 hover:text-white">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                                    </button>
                                    <button onclick="deleteNotice('${n.id}')" class="text-rose-500 hover:text-white">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                    </div>`;
            });
            if(data.length > 0) document.getElementById('notice-dot').classList.remove('hidden');
        }

        async function publishNewNotice() {
            const val = document.getElementById('notice-input').value;
            if(!val) return alert("Empty notice!");
            const { error } = await supabaseClient.from('notices').insert([{ content: val }]);
            if(!error) { 
                document.getElementById('notice-input').value = "";
                fetchNotices(); 
                alert("Published!"); 
            }
        }

        function editNoticeUI(id, content) {
            toggleNoticeSidebar();
            const input = document.getElementById('notice-input');
            input.value = content;
            input.focus();
            const btn = document.getElementById('broadcast-btn');
            btn.innerText = "Save Changes";
            btn.setAttribute('onclick', `updateNoticeRow('${id}')`);
            btn.classList.add('bg-blue-600', 'text-white');
        }

        async function updateNoticeRow(id) {
            const val = document.getElementById('notice-input').value;
            const { error } = await supabaseClient.from('notices').update({ content: val }).eq('id', id);
            if(!error) {
                const btn = document.getElementById('broadcast-btn');
                btn.innerText = "Push Broadcast";
                btn.setAttribute('onclick', "publishNewNotice()");
                btn.classList.remove('bg-blue-600', 'text-white');
                document.getElementById('notice-input').value = "";
                fetchNotices();
                alert("Updated!");
            }
        }

        async function deleteNotice(id) {
            if(!confirm("Delete?")) return;
            const { error } = await supabaseClient.from('notices').delete().eq('id', id);
            if(!error) fetchNotices();
        }

        function toggleNoticeSidebar() {
            const sb = document.getElementById('notice-sidebar');
            const ov = document.getElementById('sidebar-overlay');
            sb.classList.toggle('translate-x-full');
            ov.classList.toggle('hidden');
        }

        async function fetchVideos() {
            const { data, error } = await supabaseClient.from('videos').select('*').order('created_at', { ascending: false });
            if (!error) { videos = data; renderVideos(); }
        }

        async function addVideo() {
            const title = document.getElementById('v-title').value;
            const url = document.getElementById('v-url').value;
            const cat = document.getElementById('v-cat').value;
            const vidId = url.includes("v=") ? url.split("v=")[1].split("&")[0] : url.split("/").pop();
            const { error } = await supabaseClient.from('videos').insert([{ title, url: vidId, category: cat }]);
            if(!error) { document.getElementById('v-title').value = ""; document.getElementById('v-url').value = ""; fetchVideos(); }
        }

        function setTab(t) {
    currentTab = t;
    
    // 1. Find all tab buttons
    const tabs = ['SSC', 'HSC', 'Admission'];
    
    tabs.forEach(tabName => {
        const btn = document.getElementById(`tab-${tabName}`);
        if (!btn) return;

        // 2. If it's the selected tab, add the color and shadow
        if (tabName === t) {
            btn.classList.add('bg-rose-600', 'text-white', 'shadow-lg', 'shadow-rose-900/40');
            btn.classList.remove('text-gray-400');
        } else {
            // 3. If not selected, make it look inactive
            btn.classList.remove('bg-rose-600', 'text-white', 'shadow-lg', 'shadow-rose-900/40');
            btn.classList.add('text-gray-400');
        }
    });

    renderVideos();
}

        function renderVideos() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = '';
            videos.filter(v => v.category === currentTab).forEach(v => {
                grid.innerHTML += `
                    <div class="group">
                        <div class="aspect-video bg-black rounded-[2rem] overflow-hidden border border-white/5">
                            <iframe class="w-full h-full" src="https://www.youtube.com/embed/${v.url}" frameborder="0" allowfullscreen></iframe>
                        </div>
                        <h3 class="mt-4 font-black">${v.title}</h3>
                    </div>`;
            });
        }

        function logout() { localStorage.removeItem('eduverse_session'); location.reload(); }
    </script>
</body>
</html>
