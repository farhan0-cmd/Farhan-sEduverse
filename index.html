<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#080808">
    <title>Farhan's Eduverse</title>
    
    <link rel="icon" href="https://fav.farm/🎓" />
    <link rel="apple-touch-icon" href="https://fav.farm/🎓">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Farhan's%20Eduverse%22,%22short_name%22:%22Eduverse%22,%22start_url%22:%22/%22,%22display%22:%22standalone%22,%22background_color%22:%22#080808%22,%22theme_color%22:%22#e11d48%22,%22icons%22:[{%22src%22:%22https://fav.farm/🎓%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22}]}">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { background-color: #080808; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #080808; }
        ::-webkit-scrollbar-thumb { background: #e11d48; border-radius: 10px; }
        .sidebar-transition { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card { background: rgba(17, 17, 17, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div id="login-page" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-[#111] border border-white/10 rounded-[2.5rem] p-10 shadow-2xl text-center">
            <h1 class="text-4xl font-black mb-2 tracking-tighter italic">FARHAN'S <span class="text-rose-600 underline decoration-rose-900/50">EDUVERSE</span></h1>
            <p class="text-gray-500 mb-10 text-sm tracking-widest uppercase font-bold">Mentor Portal</p>
            <div class="space-y-4 text-left">
                <input type="tel" id="login-phone" placeholder="Phone Number" class="w-full bg-[#1a1a1a] border border-white/5 rounded-2xl p-4 text-white outline-none focus:ring-2 focus:ring-rose-600">
                <input type="password" id="login-pass" placeholder="Password" class="w-full bg-[#1a1a1a] border border-white/5 rounded-2xl p-4 text-white outline-none focus:ring-2 focus:ring-rose-600">
                <button onclick="handleLogin(false)" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-4 rounded-2xl mt-4 transition-all shadow-lg shadow-rose-900/20">Enter Classroom</button>
                <button onclick="handleLogin(true)" class="w-full text-[10px] text-gray-600 mt-6 hover:text-rose-500 transition uppercase tracking-widest font-bold text-center">Operator Access (Admin Only)</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen">
        <nav class="border-b border-white/5 p-6 flex justify-between items-center bg-[#080808]/90 sticky top-0 z-40 backdrop-blur-md">
            <div class="flex items-center gap-4">
                <h1 class="text-2xl font-black tracking-tighter">FARHAN'S <span class="text-rose-600">EDUVERSE</span></h1>
                <button onclick="toggleNoticeSidebar()" class="relative p-2 bg-white/5 rounded-full hover:bg-rose-600/20 transition-all group">
                    <span id="notice-dot" class="absolute top-2 right-2 w-2 h-2 bg-rose-500 rounded-full animate-ping hidden"></span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-gray-400 group-hover:text-rose-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                </button>
            </div>
            <div class="flex items-center gap-4">
                <span id="admin-tag" class="hidden bg-rose-600/10 text-rose-500 text-[10px] px-3 py-1 rounded-full border border-rose-500/20 font-bold tracking-widest uppercase">Operator</span>
                <button onclick="logout()" class="bg-white/5 hover:bg-rose-600 px-5 py-2 rounded-xl text-xs transition-all font-bold">Logout</button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-6">
            <div id="admin-panel" class="hidden mb-12 bg-[#111] border-2 border-dashed border-rose-600/30 rounded-[2.5rem] p-10">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <h2 class="text-2xl font-black text-rose-500 italic uppercase">Operator Dashboard</h2>
                        <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Manage Cloud Storage & Broadcasts</p>
                    </div>
                    <div class="bg-[#050505] border border-white/5 px-8 py-4 rounded-3xl text-right shadow-2xl">
                        <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest block mb-1">Total Students</span>
                        <span id="user-count" class="text-4xl font-black text-white">0</span>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-10">
                    <input id="v-title" placeholder="Lesson Title" class="bg-[#1a1a1a] border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-rose-600 transition-all">
                    <input id="v-url" placeholder="YouTube Link/ID" class="bg-[#1a1a1a] border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-rose-600 transition-all">
                    <select id="v-cat" class="bg-[#1a1a1a] border border-white/10 p-4 rounded-2xl text-white outline-none cursor-pointer">
                        <option value="SSC">SSC</option>
                        <option value="HSC">HSC</option>
                        <option value="Admission">Admission</option>
                    </select>
                    <button onclick="addVideo()" class="bg-rose-600 hover:bg-rose-700 text-white font-bold rounded-2xl p-4 transition-all shadow-lg shadow-rose-900/20">Publish Video</button>
                </div>

                <div class="pt-8 border-t border-white/5">
                    <h3 class="text-xs font-black text-rose-500 uppercase tracking-widest mb-4">📢 Broadcast Control</h3>
                    
                    <div id="admin-notice-manager" class="mb-6 hidden">
                         <div class="flex items-center justify-between bg-[#050505] p-4 rounded-2xl border border-white/5">
                            <div class="flex-1 pr-4">
                                <p class="text-[10px] text-gray-500 uppercase font-bold mb-1">Live Notice Content:</p>
                                <p id="current-notice-display" class="text-sm text-gray-300 italic">Loading...</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="prepareNoticeEdit()" class="px-4 py-2 bg-blue-600/20 text-blue-500 rounded-lg hover:bg-blue-600 hover:text-white transition-all text-xs font-bold uppercase">Edit</button>
                                <button onclick="clearNotice()" class="px-4 py-2 bg-rose-600/20 text-rose-500 rounded-lg hover:bg-rose-600 hover:text-white transition-all text-xs font-bold uppercase">Clear</button>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col md:flex-row gap-4">
                        <input id="notice-input" placeholder="Type new broadcast message..." class="flex-1 bg-[#1a1a1a] border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-rose-600 transition-all">
                        <button onclick="updateNotice()" class="bg-white text-black font-black px-10 py-4 rounded-2xl hover:bg-rose-600 hover:text-white transition-all shadow-xl">Push Broadcast</button>
                    </div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-center gap-8 mb-16">
                <div class="flex gap-4 p-1.5 bg-[#111] rounded-[2rem] w-full md:w-auto border border-white/5">
                    <button onclick="setTab('SSC')" id="tab-SSC" class="tab-btn px-10 py-4 rounded-[1.5rem] font-black text-sm transition-all">SSC</button>
                    <button onclick="setTab('HSC')" id="tab-HSC" class="tab-btn px-10 py-4 rounded-[1.5rem] font-black text-sm transition-all">HSC</button>
                    <button onclick="setTab('Admission')" id="tab-Admission" class="tab-btn px-10 py-4 rounded-[1.5rem] font-black text-sm transition-all">Admission</button>
                </div>
                <div class="relative w-full md:w-96">
                    <input type="text" id="search-bar" onkeyup="renderVideos()" placeholder="Search lectures..." class="w-full bg-[#111] border border-white/5 rounded-[1.8rem] p-5 pl-14 text-sm outline-none focus:border-rose-600/50 transition-all shadow-xl">
                    <span class="absolute left-6 top-5 text-gray-600">🔍</span>
                </div>
            </div>

            <div id="video-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12"></div>
        </div>
    </div>

    <div id="notice-sidebar" class="fixed inset-y-0 right-0 w-85 max-w-[85%] bg-[#0a0a0a] border-l border-white/5 shadow-2xl sidebar-transition translate-x-full z-50 p-8">
        <div class="flex justify-between items-center mb-10">
            <h3 class="text-2xl font-black text-white italic">NOTICES</h3>
            <button onclick="toggleNoticeSidebar()" class="w-10 h-10 flex items-center justify-center bg-white/5 rounded-full hover:bg-rose-600 transition-all">✕</button>
        </div>
        <div id="sidebar-content" class="space-y-6">
            <div class="bg-rose-600/5 border border-rose-600/20 p-6 rounded-[2rem] shadow-inner">
                <p class="text-[10px] text-rose-500 uppercase font-black tracking-widest mb-3">Admin Announcement</p>
                <p id="sidebar-notice-text" class="text-gray-200 leading-relaxed italic text-sm md:text-base">No active notices.</p>
                <div class="mt-8 pt-4 border-t border-white/5 flex justify-between items-center">
                    <span class="text-[9px] text-gray-600 font-bold uppercase tracking-widest" id="notice-time"></span>
                    <span class="px-2 py-1 bg-rose-600/20 text-rose-500 text-[8px] font-black rounded uppercase">Live</span>
                </div>
            </div>
        </div>
    </div>
    <div id="sidebar-overlay" onclick="toggleNoticeSidebar()" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-40"></div>

    <script>
        const SB_URL = "https://zfvldodcinjjpjcfgqdt.supabase.co"; 
        const SB_KEY = "sb_publishable_JtkUYO8tBkzdIxz9xStn5A_B9YQgHwE";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const MASTER_PHONE = "01533082057";
        const MASTER_PASS = "FARHAN03";

        let isAdmin = false;
        let currentTab = 'SSC';
        let videos = [];
        let activeNoticeString = "";

        window.onload = async function() {
            const savedUser = localStorage.getItem('eduverse_session');
            if (savedUser) {
                const userData = JSON.parse(savedUser);
                isAdmin = userData.isAdmin;
                showApp();
            }
            setTab('SSC'); 
            await fetchVideos();
        };

        async function fetchVideos() {
            const { data, error } = await supabaseClient.from('videos').select('*').order('created_at', { ascending: false });
            if (!error) { videos = data; renderVideos(); }
        }

        async function handleLogin(isOp) {
            const phone = document.getElementById('login-phone').value;
            const pass = document.getElementById('login-pass').value;
            if(!phone) return alert("Credentials required!");

            if(isOp) {
                if(phone === MASTER_PHONE && pass === MASTER_PASS) { isAdmin = true; }
                else { return alert("❌ Unauthorized Operator!"); }
            } else {
                isAdmin = false;
                await supabaseClient.from('profiles').upsert({ phone: phone, last_login: new Date() }, { onConflict: 'phone' });
            }

            localStorage.setItem('eduverse_session', JSON.stringify({ phone, isAdmin }));
            showApp();
        }

        function showApp() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            fetchNotice();
            
            if(isAdmin) { 
                document.getElementById('admin-panel').classList.remove('hidden'); 
                document.getElementById('admin-tag').classList.remove('hidden');
                document.getElementById('admin-notice-manager').classList.remove('hidden');
                fetchUserCount();
            }
            renderVideos();
        }

        function toggleNoticeSidebar() {
            const sb = document.getElementById('notice-sidebar');
            const ov = document.getElementById('sidebar-overlay');
            const dot = document.getElementById('notice-dot');
            if(sb.classList.contains('translate-x-full')) {
                sb.classList.remove('translate-x-full');
                ov.classList.remove('hidden');
                dot.classList.add('hidden'); 
            } else {
                sb.classList.add('translate-x-full');
                ov.classList.add('hidden');
            }
        }

        async function fetchUserCount() {
            if (!isAdmin) return;
            const { count, error } = await supabaseClient.from('profiles').select('*', { count: 'exact', head: true });
            if (!error) document.getElementById('user-count').innerText = count;
        }

        async function fetchNotice() {
            const { data, error } = await supabaseClient.from('notices').select('*').eq('id', 1).maybeSingle();
            if (!error && data) {
                activeNoticeString = data.content;
                document.getElementById('sidebar-notice-text').innerText = data.content;
                
                const dateObj = new Date(data.updated_at);
                document.getElementById('notice-time').innerText = "Posted: " + dateObj.toLocaleDateString();
                
                if(document.getElementById('notice-sidebar').classList.contains('translate-x-full')) {
                    document.getElementById('notice-dot').classList.remove('hidden');
                }
                
                if(isAdmin) {
                    document.getElementById('current-notice-display').innerText = `"${data.content}"`;
                }
            }
        }

        async function updateNotice() {
            const inputField = document.getElementById('notice-input');
            const newContent = inputField.value;
            if(!newContent) return alert("Type something to broadcast!");
            
            const { error } = await supabaseClient
                .from('notices')
                .update({ 
                    content: newContent, 
                    updated_at: new Date().toISOString() 
                })
                .eq('id', 1);
                
            if(!error) { 
                alert("📢 Broadcast Published!"); 
                inputField.value = ""; // FIX: Clears input box after success
                fetchNotice(); 
            } else {
                alert("Cloud Error: " + error.message);
            }
        }

        // Feature: Move current notice into input for editing
        function prepareNoticeEdit() {
            document.getElementById('notice-input').value = activeNoticeString;
            document.getElementById('notice-input').focus();
        }

        // Feature: Clear notice logic
        async function clearNotice() {
            if(!confirm("Clear notice board for all students?")) return;
            const { error } = await supabaseClient
                .from('notices')
                .update({ content: "No active notices.", updated_at: new Date().toISOString() })
                .eq('id', 1);
            if(!error) fetchNotice();
        }

        async function addVideo() {
            const title = document.getElementById('v-title').value;
            const urlInput = document.getElementById('v-url').value;
            const cat = document.getElementById('v-cat').value;
            if(!title || !urlInput) return alert("Fill all details!");
            let videoId = urlInput.includes("v=") ? urlInput.split("v=")[1].split("&")[0] : urlInput.split("/").pop();
            const { error } = await supabaseClient.from('videos').insert([{ title, category: cat, url: videoId }]);
            if (!error) { 
                alert("🚀 Published!"); 
                document.getElementById('v-title').value = ""; 
                document.getElementById('v-url').value = ""; 
                fetchVideos(); 
            }
        }

        async function deleteVideo(id) {
            if(!confirm("Erase from Cloud?")) return;
            const { error } = await supabaseClient.from('videos').delete().eq('id', id);
            if(!error) fetchVideos();
        }

        function setTab(t) {
            currentTab = t;
            document.querySelectorAll('.tab-btn').forEach(btn => { 
                btn.className = "tab-btn px-10 py-4 rounded-[1.5rem] font-black text-sm bg-[#121212] text-gray-500 hover:text-white transition-all"; 
            });
            const activeBtn = document.getElementById('tab-' + t);
            activeBtn.className = "tab-btn px-10 py-4 rounded-[1.5rem] font-black text-sm bg-rose-600 text-white shadow-xl shadow-rose-900/30";
            renderVideos();
        }

        function renderVideos() {
            const grid = document.getElementById('video-grid');
            const searchTerm = document.getElementById('search-bar').value.toLowerCase();
            grid.innerHTML = '';
            const filtered = videos.filter(v => v.category === currentTab && v.title.toLowerCase().includes(searchTerm));
            
            if(filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-32 text-gray-700 italic border-4 border-dashed border-white/5 rounded-[3rem]">No lectures found.</div>`;
                return;
            }

            filtered.forEach(v => {
                grid.innerHTML += `
                    <div class="group">
                        <div class="aspect-video bg-black rounded-[2.5rem] overflow-hidden border-2 border-white/5 shadow-2xl group-hover:border-rose-600 transition-all duration-500">
                            <iframe class="w-full h-full" src="https://www.youtube.com/embed/${v.url}" frameborder="0" allowfullscreen></iframe>
                        </div>
                        <div class="mt-8 flex justify-between items-start px-4">
                            <div>
                                <h3 class="text-xl font-black group-hover:text-rose-500 transition-colors tracking-tight leading-tight">${v.title}</h3>
                                <div class="flex items-center gap-2 mt-2">
                                    <span class="w-2 h-2 rounded-full bg-rose-600 animate-pulse"></span>
                                    <p class="text-[10px] text-gray-600 uppercase font-black tracking-widest">${v.category} MODULE</p>
                                </div>
                            </div>
                            ${isAdmin ? `<button onclick="deleteVideo(${v.id})" class="bg-white/5 hover:bg-rose-600 p-3 rounded-full transition-all">✕</button>` : ''}
                        </div>
                    </div>`;
            });
        }

        function logout() { localStorage.removeItem('eduverse_session'); location.reload(); }
    </script>
</body>
</html>
