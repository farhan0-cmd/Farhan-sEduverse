<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farhan's Eduverse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #080808; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-active { background-color: #e11d48 !important; color: white !important; }
        .tab-inactive { background-color: #1a1a1a !important; color: #9ca3af !important; }
        #notice-sidebar { transition: transform 0.3s ease-in-out; z-index: 100; }
    </style>
</head>
<body>

    <div id="login-page" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass p-8 rounded-3xl w-full max-w-md text-center">
            <h1 class="text-3xl font-bold mb-6">Farhan's <span class="text-rose-600">Eduverse</span></h1>
            <input type="tel" id="login-phone" placeholder="Phone Number" class="w-full bg-[#111] border border-white/10 p-4 rounded-xl mb-4 outline-none">
            <input type="password" id="login-pass" placeholder="Password" class="w-full bg-[#111] border border-white/10 p-4 rounded-xl mb-6 outline-none">
            <button onclick="handleLogin()" class="w-full bg-rose-600 hover:bg-rose-700 py-4 rounded-xl font-bold transition">Enter</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <nav class="p-6 flex justify-between items-center border-b border-white/5">
            <h1 class="text-2xl font-bold cursor-pointer" onclick="switchView('free')">Farhan's <span class="text-rose-600">Eduverse</span></h1>
            <div class="flex items-center gap-4">
                <button onclick="toggleNoticeSidebar()" class="relative p-2 bg-white/5 rounded-full">
                    <span id="notice-dot" class="absolute top-1 right-1 w-2 h-2 bg-rose-500 rounded-full hidden"></span>
                    🔔
                </button>
                <button id="academy-btn" onclick="switchView('paid')" class="bg-rose-600/20 text-rose-500 px-4 py-2 rounded-lg font-bold border border-rose-600/30">Paid Academy</button>
                <button onclick="logout()" class="text-sm text-gray-400">Logout</button>
            </div>
        </nav>

        <div class="p-6 max-w-7xl mx-auto">
            
            <div id="admin-panel" class="hidden mb-10 p-6 border-2 border-dashed border-rose-600/20 rounded-3xl">
                <h2 class="text-rose-500 font-bold mb-4">Operator Dashboard</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                    <button onclick="setAdminMode('free')" class="bg-[#1a1a1a] p-2 rounded-lg text-sm">Manage Free Videos</button>
                    <button onclick="setAdminMode('paid')" class="bg-[#1a1a1a] p-2 rounded-lg text-sm">Manage Paid Courses</button>
                    <button onclick="setAdminMode('notices')" class="bg-[#1a1a1a] p-2 rounded-lg text-sm">Manage Notices</button>
                    <button onclick="setAdminMode('verify')" class="bg-[#1a1a1a] p-2 rounded-lg text-sm">Verify Payments</button>

                    <div class="bg-rose-600/10 border border-rose-600/20 p-4 rounded-2xl text-center min-w-[120px] inline-block">
    <p class="text-[10px] text-gray-400 uppercase tracking-wider mb-1 whitespace-nowrap">Total Students</p>
    <span id="student-count" class="text-2xl font-bold text-rose-500 leading-none">0</span>
</div>
</div>
                </div>

                <div id="adm-free" class="grid grid-cols-1 md:grid-cols-3 gap-2">
                    <input id="v-title" placeholder="Title" class="bg-[#111] p-3 rounded-lg border border-white/5">
                    <input id="v-url" placeholder="Paste YouTube Link" class="bg-[#111] p-3 rounded-lg border border-white/5">
                    <button onclick="addVideo()" class="bg-rose-600 rounded-lg">Add Video</button>
                </div>

                <div id="adm-paid" class="hidden grid grid-cols-1 md:grid-cols-2 gap-2">
                    <input id="c-title" placeholder="Course Title" class="bg-[#111] p-3 rounded-lg border border-white/5">
                    <input id="c-price" placeholder="Price" class="bg-[#111] p-3 rounded-lg border border-white/5">
                    <input id="c-thumb" placeholder="Thumbnail Image Link" class="bg-[#111] p-3 rounded-lg border border-white/5">
                    <input id="c-playlist" placeholder="YouTube Playlist Link" class="bg-[#111] p-3 rounded-lg border border-white/5">
                    <button onclick="publishCourse()" class="md:col-span-2 bg-rose-600 p-3 rounded-lg">Publish Course</button>
                </div>

                <div id="adm-notices" class="hidden space-y-4">
                    <div class="flex gap-2">
                        <input id="notice-input" placeholder="New Notice..." class="flex-1 bg-[#111] p-3 rounded-lg border border-white/5">
                        <button onclick="addNotice()" class="bg-white text-black px-6 rounded-lg font-bold">Push</button>
                    </div>
                    <div id="admin-notice-list" class="space-y-2 max-h-40 overflow-y-auto"></div>
                </div>

                <div id="adm-verify" class="hidden space-y-2">
                    <div id="pending-requests" class="space-y-2"></div>
                </div>
            </div>

            <div id="free-view">
                <div class="flex gap-2 mb-8 overflow-x-auto pb-2">
                    <button onclick="setTab('SSC')" id="tab-SSC" class="tab-active px-6 py-2 rounded-full font-bold transition">SSC</button>
                    <button onclick="setTab('HSC')" id="tab-HSC" class="tab-inactive px-6 py-2 rounded-full font-bold transition">HSC</button>
                    <button onclick="setTab('Admission')" id="tab-Admission" class="tab-inactive px-6 py-2 rounded-full font-bold transition">Admission</button>
                </div>
                <div id="video-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            </div>

            <div id="paid-view" class="hidden">
                <div id="classroom-ui" class="hidden">
                    <button onclick="closeClassroom()" class="text-rose-500 mb-6 font-bold flex items-center gap-2">← Back to Academy</button>
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-2">
                            <div class="aspect-video w-full bg-black rounded-3xl overflow-hidden border border-white/10 shadow-2xl">
                                <iframe id="classroom-player" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
                            </div>
                            <h2 id="now-playing-title" class="text-xl font-bold mt-4 text-rose-500">Select a Lesson</h2>
                        </div>
                        <div class="bg-[#111] rounded-3xl p-6 border border-white/5 h-[500px] overflow-y-auto">
                            <h3 class="font-bold mb-4 border-b border-white/10 pb-2 text-gray-400">Course Lessons</h3>
                            <div id="lesson-list" class="space-y-3"></div>
                            <div id="admin-lesson-controls" class="hidden mt-6 pt-6 border-t border-white/10">
                                <input id="new-lesson-title" placeholder="Lesson Title" class="w-full bg-black text-xs p-2 rounded mb-2 border border-white/5">
                                <input id="new-lesson-vid" placeholder="YouTube Video ID" class="w-full bg-black text-xs p-2 rounded mb-2 border border-white/5">
                                <button onclick="addLessonToCourse()" class="w-full bg-blue-600 text-[10px] font-bold py-2 rounded">ADD LESSON</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="course-catalog-container">
                    <div class="flex gap-2 mb-8 overflow-x-auto pb-2">
                        <button onclick="setTabPaid('SSC')" id="tab-paid-SSC" class="tab-active px-6 py-2 rounded-full font-bold transition">SSC</button>
                        <button onclick="setTabPaid('HSC')" id="tab-paid-HSC" class="tab-inactive px-6 py-2 rounded-full font-bold transition">HSC</button>
                        <button onclick="setTabPaid('Admission')" id="tab-paid-Admission" class="tab-inactive px-6 py-2 rounded-full font-bold transition">Admission</button>
                    </div>
                    <div id="course-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="pay-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-50">
        <div class="bg-[#111] p-8 rounded-3xl w-full max-w-md border border-white/10">
            <h3 class="text-xl font-bold mb-4" id="pay-title">Enroll</h3>
            <p class="text-gray-400 text-sm mb-6">Send money to bKash: <span class="text-white font-bold">01533082057</span></p>
            <input id="trx-id" placeholder="Transaction ID (TrxID)" class="w-full bg-black border border-white/10 p-4 rounded-xl mb-4 outline-none">
            <button onclick="confirmPay()" class="w-full bg-rose-600 py-4 rounded-xl font-bold">Submit</button>
            <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="w-full mt-2 text-gray-500 text-sm">Cancel</button>
        </div>
    </div>

    <div id="notice-sidebar" class="fixed top-0 right-0 h-full w-80 bg-[#0a0a0a] border-l border-white/10 translate-x-full p-6">
        <div class="flex justify-between items-center mb-8">
            <h3 class="font-bold text-xl text-rose-500">Notices</h3>
            <button onclick="toggleNoticeSidebar()" class="text-white text-xl">✕</button>
        </div>
        <div id="notice-content" class="space-y-4"></div>
    </div>

    <script>
        const SB_URL = "https://zfvldodcinjjpjcfgqdt.supabase.co";
        const SB_KEY = "sb_publishable_JtkUYO8tBkzdIxz9xStn5A_B9YQgHwE";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let user = null, isAdmin = false, currentCategory = 'SSC', allVideos = [];

        const getVidId = (url) => url.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/|.*embed\/))([^"&?\/\s]{11})/)?. [1] || url;
        const getListId = (url) => url.match(/[&?]list=([^&]+)/)?. [1] || url;

        window.onload = () => {
            const saved = localStorage.getItem('edu_user');
            if(saved) { 
                const d = JSON.parse(saved); 
                user = d.phone; isAdmin = d.isAdmin; 
                showMain(); 
            }
            fetchVideos();
            fetchNotices();
            fetchCourses();
        };

        async function handleLogin() {
            const phone = document.getElementById('login-phone').value, pass = document.getElementById('login-pass').value;
            const { data } = await supabaseClient.from('users').select('*').eq('phone', phone).single();
            if(!data) {
                await supabaseClient.from('users').insert([{ phone, password: pass }]);
                completeLogin(phone, false);
            } else if(data.password === pass) {
                completeLogin(phone, data.is_admin);
            } else { alert("Wrong password"); }
        }

        function completeLogin(phone, admin) {
            user = phone; isAdmin = admin;
            localStorage.setItem('edu_user', JSON.stringify({ phone, isAdmin }));
            showMain();
        }

        function showMain() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            if(isAdmin) {
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('admin-lesson-controls').classList.remove('hidden');
                fetchEnrollments();
            }
        }

        async function fetchVideos() {
            const { data } = await supabaseClient.from('videos').select('*');
            allVideos = data || [];
            renderVideos();
        }

        function renderVideos() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = allVideos.filter(v => v.category === currentCategory).map(v => `
                <div class="bg-[#111] rounded-2xl overflow-hidden border border-white/5">
                    <iframe class="w-full aspect-video" src="https://www.youtube.com/embed/${v.url}" frameborder="0" allowfullscreen></iframe>
                    <div class="p-4 flex justify-between items-center">
                        <h4 class="font-bold text-sm">${v.title}</h4>
                        ${isAdmin ? `<button onclick="deleteVideo(${v.id})" class="text-rose-500">✕</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        async function addVideo() {
            const title = document.getElementById('v-title').value;
            const url = getVidId(document.getElementById('v-url').value);
            await supabaseClient.from('videos').insert([{ title, url, category: currentCategory }]);
            fetchVideos();
        }

        async function deleteVideo(id) {
            await supabaseClient.from('videos').delete().eq('id', id);
            fetchVideos();
        }

        async function fetchCourses() {
            const { data: courses } = await supabaseClient.from('paid_courses').select('*');
            const { data: access } = await supabaseClient.from('course_access').select('course_id').eq('student_phone', user).eq('status', 'approved');
            
            // Fix: Normalize IDs to ensure match
            const unlocked = access?.map(a => Number(a.course_id)) || [];
            const filtered = courses?.filter(c => c.category === currentCategory) || [];

            document.getElementById('course-grid').innerHTML = filtered.map(c => `
                <div class="bg-[#111] rounded-2xl overflow-hidden border border-white/5 shadow-lg relative">
                    ${isAdmin ? `
                        <div class="absolute top-2 right-2 flex gap-2 z-20">
                            <button onclick="editCourse(${c.id}, '${c.title}', '${c.price}', '${c.thumbnail_url}', '${c.video_playlist_link}')" class="bg-blue-600 text-white p-2 rounded-lg text-[10px] font-bold">EDIT</button>
                            <button onclick="deleteCourse(${c.id})" class="bg-rose-600 text-white p-2 rounded-lg text-[10px] font-bold">✕</button>
                        </div>
                    ` : ''}
                    <img src="${c.thumbnail_url}" class="w-full aspect-video object-cover">
                    <div class="p-4">
                        <h3 class="font-bold text-sm mb-4 line-clamp-2">${c.title}</h3>
                        <div class="flex justify-between items-center">
                            <span class="text-rose-500 font-bold">৳${c.price}</span>
                            ${isAdmin ? 
                                `<button onclick="enterClass(${c.id})" class="bg-gray-700 px-4 py-2 rounded-xl text-xs font-bold transition">Preview</button>` : 
                                (unlocked.includes(Number(c.id)) ? 
                                    `<button onclick="enterClass(${c.id})" class="bg-green-600 px-4 py-2 rounded-xl text-xs font-bold">Enter Class</button>` : 
                                    `<button onclick="openPay(${c.id}, '${c.title}')" class="bg-rose-600 px-4 py-2 rounded-xl text-xs font-bold">Buy Now</button>`)
                            }
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function editCourse(id, oldTitle, oldPrice, oldThumb, oldLink) {
            const newTitle = prompt("Edit Course Title:", oldTitle);
            const newPrice = prompt("Edit Price:", oldPrice);
            const newThumb = prompt("Edit Thumbnail URL:", oldThumb);
            const newLink = prompt("Edit Playlist ID (or Link):", oldLink);
            if (newTitle && newPrice && newThumb && newLink) {
                const cleanLink = getListId(newLink);
                const { error } = await supabaseClient.from('paid_courses').update({ title: newTitle, price: newPrice, thumbnail_url: newThumb, video_playlist_link: cleanLink }).eq('id', id);
                if(!error) { alert("Course Updated!"); fetchCourses(); }
            }
        }

        async function publishCourse() {
            const title = document.getElementById('c-title').value;
            const price = document.getElementById('c-price').value;
            const thumb = document.getElementById('c-thumb').value;
            const playlistInput = document.getElementById('c-playlist').value;
            const list = getListId(playlistInput);

            // Validation to prevent empty rows
            if(!title || !price || !thumb) {
                alert("Please fill in the Title, Price, and Thumbnail!");
                return;
            }

            const { data, error } = await supabaseClient
                .from('paid_courses')
                .insert([{ 
                    title, 
                    price: Number(price), 
                    thumbnail_url: thumb, 
                    video_playlist_link: list, 
                    category: currentCategory // Make sure this matches 'SSC', 'HSC', etc.
                }]);

            if (error) {
                console.error("Error publishing:", error);
                alert("Error: " + error.message);
            } else {
                alert("Course Published Successfully!");
                // Clear inputs
                document.getElementById('c-title').value = "";
                document.getElementById('c-price').value = "";
                document.getElementById('c-thumb').value = "";
                document.getElementById('c-playlist').value = "";
                // Refresh the UI
                fetchCourses();
            }
        }
        async function deleteCourse(id) { if(confirm("Delete Course?")) { await supabaseClient.from('paid_courses').delete().eq('id', id); fetchCourses(); } }

        let currentOpenCourseId = null;
        async function enterClass(courseId) {
            currentOpenCourseId = courseId;
            document.getElementById('course-catalog-container').classList.add('hidden');
            document.getElementById('classroom-ui').classList.remove('hidden');
            fetchLessons(courseId);
        }

        async function fetchLessons(courseId) {
            const { data: lessons } = await supabaseClient.from('course_lessons').select('*').eq('course_id', courseId).order('created_at', { ascending: true });
            const list = document.getElementById('lesson-list');
            if (lessons && lessons.length > 0) {
                playLesson(lessons[0].video_id, lessons[0].lesson_title);
                list.innerHTML = lessons.map(l => `
                    <div onclick="playLesson('${l.video_id}', '${l.lesson_title.replace(/'/g, "\\'")}')" class="p-3 bg-white/5 rounded-xl cursor-pointer hover:bg-rose-600/20 border border-white/5 transition flex justify-between items-center group">
                        <span class="text-xs font-medium text-gray-300 group-hover:text-white">${l.lesson_title}</span>
                        <div class="flex gap-2">${isAdmin ? `<button onclick="event.stopPropagation(); deleteLesson(${l.id})" class="text-rose-500 text-[10px]">✕</button>` : '▶'}</div>
                    </div>`).join('');
            } else {
                list.innerHTML = `<p class="text-xs text-gray-500 text-center py-10">No lessons added yet.</p>`;
                document.getElementById('classroom-player').src = "";
            }
        }

        function playLesson(vidId, title) {
            document.getElementById('classroom-player').src = `https://www.youtube.com/embed/${vidId}?autoplay=1`;
            document.getElementById('now-playing-title').innerText = title;
        }

        async function addLessonToCourse() {
            const title = document.getElementById('new-lesson-title').value;
            const vid = getVidId(document.getElementById('new-lesson-vid').value);
            if (title && vid && currentOpenCourseId) {
                await supabaseClient.from('course_lessons').insert([{ course_id: currentOpenCourseId, lesson_title: title, video_id: vid }]);
                document.getElementById('new-lesson-title').value = ""; document.getElementById('new-lesson-vid').value = "";
                fetchLessons(currentOpenCourseId);
            }
        }

        async function deleteLesson(id) {
            if(confirm("Delete lesson?")) { await supabaseClient.from('course_lessons').delete().eq('id', id); fetchLessons(currentOpenCourseId); }
        }

        function closeClassroom() {
            document.getElementById('course-catalog-container').classList.remove('hidden');
            document.getElementById('classroom-ui').classList.add('hidden');
            document.getElementById('classroom-player').src = "";
        }

        async function fetchNotices() {
            const { data } = await supabaseClient.from('notices').select('*').order('created_at', { ascending: false });
            document.getElementById('notice-content').innerHTML = data?.map(n => `<div class="bg-white/5 p-4 rounded-xl text-sm border border-white/5">${n.content}</div>`).join('');
            if(data?.length) document.getElementById('notice-dot').classList.remove('hidden');

            if(isAdmin) {
                document.getElementById('admin-notice-list').innerHTML = data?.map(n => `
                    <div class="flex justify-between items-center bg-black/40 p-2 rounded-lg text-xs">
                        <span class="truncate w-40">${n.content}</span>
                        <div class="flex gap-2">
                            <button onclick="editNotice(${n.id}, '${n.content}')" class="text-blue-400">Edit</button>
                            <button onclick="deleteNotice(${n.id})" class="text-rose-500">Delete</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function addNotice() {
            const val = document.getElementById('notice-input').value;
            if(val) { await supabaseClient.from('notices').insert([{ content: val }]); document.getElementById('notice-input').value = ""; fetchNotices(); }
        }
        async function deleteNotice(id) { await supabaseClient.from('notices').delete().eq('id', id); fetchNotices(); }
        async function editNotice(id, old) { const n = prompt("Update notice:", old); if(n) { await supabaseClient.from('notices').update({ content: n }).eq('id', id); fetchNotices(); } }

        async function fetchEnrollments() {
            const { data } = await supabaseClient.from('course_access').select('*, paid_courses(title)').eq('status', 'pending');
            const container = document.getElementById('pending-requests');
            if(container) {
                container.innerHTML = data?.map(e => `
                    <div class="flex justify-between items-center bg-black/40 p-3 rounded-xl border border-white/5">
                        <div class="text-xs">
                            <p class="font-bold text-rose-500">${e.paid_courses?.title}</p>
                            <p class="text-gray-500">${e.student_phone} | Trx: ${e.trx_id}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="verifyPay('${e.id}', 'approved')" class="bg-green-600 px-3 py-1 rounded-lg text-[10px] font-bold">Approve</button>
                            <button onclick="verifyPay('${e.id}', 'rejected')" class="bg-rose-600 px-3 py-1 rounded-lg text-[10px] font-bold">Reject</button>
                        </div>
                    </div>
                `).join('') || '<p class="text-xs text-gray-500">No pending payments</p>';
            }
        }

        async function verifyPay(id, newStatus) { 
            const { error } = await supabaseClient.from('course_access').update({ status: newStatus }).eq('id', id); 
            if(!error) { alert(`Enrollment has been ${newStatus}!`); fetchEnrollments(); fetchCourses(); }
        }

        function setTab(t) { 
            currentCategory = t; 
            renderVideos(); 
            fetchCourses();
            document.querySelectorAll('[id^="tab-"]').forEach(btn => {
                if(btn.id === `tab-${t}` || btn.id === `tab-paid-${t}`) {
                    btn.classList.replace('tab-inactive', 'tab-active');
                } else {
                    btn.classList.replace('tab-active', 'tab-inactive');
                }
            }); 
        }

        async function fetchStudentCount() {
    const { count, error } = await supabaseClient
        .from('users')
        .select('*', { count: 'exact', head: true });
    
    if (!error) {
        document.getElementById('student-count').innerText = count;
    }
}

// Call this inside your showMain() function so it updates when you log in
function showMain() {
    document.getElementById('login-page').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
    if(isAdmin) {
        document.getElementById('admin-panel').classList.remove('hidden');
        fetchEnrollments();
        fetchStudentCount(); // New call here
    }
}

        // Separate function to update only paid view tabs (keeps free tabs untouched)
        function setTabPaid(t) {
            currentCategory = t;
            fetchCourses();  // Refresh paid courses with new category
            // Update styling for paid category tabs only
            const paidTabs = ['SSC', 'HSC', 'Admission'];
            paidTabs.forEach(tab => {
                const btn = document.getElementById(`tab-paid-${tab}`);
                if (btn) {
                    if (tab === t) {
                        btn.classList.replace('tab-inactive', 'tab-active');
                    } else {
                        btn.classList.replace('tab-active', 'tab-inactive');
                    }
                }
            });
            // Also sync free tabs if visible? not necessary but ensure consistency.
            const freeTabs = ['SSC', 'HSC', 'Admission'];
            freeTabs.forEach(tab => {
                const btn = document.getElementById(`tab-${tab}`);
                if (btn) {
                    if (tab === t) {
                        btn.classList.replace('tab-inactive', 'tab-active');
                    } else {
                        btn.classList.replace('tab-active', 'tab-inactive');
                    }
                }
            });
        }

        function toggleNoticeSidebar() {
            const sb = document.getElementById('notice-sidebar');
            sb.classList.toggle('translate-x-full');
            document.getElementById('notice-dot').classList.add('hidden');
        }

        function setAdminMode(m) { ['free','paid','notices','verify'].forEach(s => document.getElementById(`adm-${s}`).classList.toggle('hidden', s !== m)); }
        
        function switchView(v) { 
            document.getElementById('free-view').classList.toggle('hidden', v !== 'free'); 
            document.getElementById('paid-view').classList.toggle('hidden', v !== 'paid'); 
            const btn = document.getElementById('academy-btn');
            if (v === 'paid') {
                btn.innerText = 'Go Home';
                btn.onclick = () => switchView('free');
                // Ensure that if we switch to paid, classroom is closed properly and category sync
                closeClassroom();
                // Sync currentCategory to paid tabs visually
                setTabPaid(currentCategory);
            } else {
                btn.innerText = 'Paid Academy';
                btn.onclick = () => switchView('paid');
                // closeClassroom already called? but just in case
                closeClassroom(); 
                // sync free tabs to current category
                setTab(currentCategory);
            }
        }

        function logout() { localStorage.clear(); location.reload(); }
        
        let activePayId = null;
        function openPay(id, title) { activePayId = id; document.getElementById('pay-title').innerText = title; document.getElementById('pay-modal').classList.remove('hidden'); }
        async function confirmPay() {
            const trx = document.getElementById('trx-id').value;
            await supabaseClient.from('course_access').insert([{ student_phone: user, trx_id: trx, course_id: activePayId, status: 'pending' }]);
            document.getElementById('pay-modal').classList.add('hidden');
            alert("Payment submitted! Wait for approval.");
            fetchEnrollments();
        }
    </script>
</body>
</html>
